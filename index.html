<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Missa Perpetua ad honorem Sanctae Veronicae Giuliani</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #f7f1df;
      --muted: #c6bda9;
      --dim: #81796b;
      --bg: #15110c;
      --panel: #211b13;
      --panel-2: #332718;
      --line: #5a4529;
      --gold: #c99f3f;
      --red: #98473f;
      --blue: #547489;
      --green: #6f8d71;
      --violet: #89729e;
      --shadow: rgba(0, 0, 0, 0.34);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      background:
        linear-gradient(180deg, rgba(31, 23, 15, 0.97), rgba(10, 9, 7, 1)),
        repeating-linear-gradient(90deg, rgba(255,255,255,0.025) 0 1px, transparent 1px 5px);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 1px solid var(--line);
      background: #28241b;
      color: var(--ink);
      cursor: pointer;
    }

    button:hover {
      border-color: #776844;
      background: #342e22;
    }

    button:active {
      transform: translateY(1px);
    }

    button:focus-visible,
    input:focus-visible {
      outline: 2px solid var(--gold);
      outline-offset: 2px;
    }

    .app {
      height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
      overflow: hidden;
    }

    .topbar {
      position: relative;
      z-index: 4;
      display: grid;
      grid-template-columns: 1fr;
      justify-items: center;
      align-items: center;
      gap: 12px;
      padding: 16px 28px 14px;
      border-bottom: 1px solid rgba(201, 159, 63, 0.34);
      background: rgba(24, 17, 11, 0.94);
    }

    .identity {
      display: grid;
      justify-items: center;
      gap: 5px;
      min-width: 0;
      text-align: center;
    }

    h1 {
      margin: 0;
      color: #fff8e7;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(1.8rem, 2.8vw, 3rem);
      font-weight: 500;
      line-height: 1;
      white-space: nowrap;
    }

    .subtitle {
      display: block;
      min-width: 0;
      color: #d8c58e;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(0.82rem, 1.45vw, 1.05rem);
      font-style: italic;
      line-height: 1.2;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .transport {
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: center;
    }

    .icon-btn {
      width: 58px;
      height: 58px;
      display: inline-grid;
      place-items: center;
      border-radius: 50%;
      font-size: 0;
      line-height: 1;
    }

    .icon-btn.primary {
      position: relative;
      color: #17130d;
      background: var(--gold);
      border-color: #edcf78;
      font-weight: 800;
      font-family: Georgia, "Times New Roman", serif;
    }

    .icon-btn.primary::before {
      content: "";
      width: 0;
      height: 0;
      margin-left: 5px;
      border-top: 14px solid transparent;
      border-bottom: 14px solid transparent;
      border-left: 22px solid #17130d;
    }

    .icon-btn.primary.is-playing::before {
      width: 20px;
      height: 27px;
      margin-left: 0;
      border: 0;
      background: linear-gradient(90deg, #17130d 0 7px, transparent 7px 13px, #17130d 13px 20px);
    }

    .main {
      width: min(860px, 100%);
      min-height: 0;
      margin: 0 auto;
      padding: 14px 18px 18px;
      display: grid;
      grid-template-columns: 1fr;
      grid-template-rows: minmax(0, 1fr);
    }

    .side {
      min-width: 0;
    }

    .side {
      display: grid;
      align-content: stretch;
      gap: 14px;
      min-height: 0;
      height: 100%;
    }

    .side > section:not(.devotion) {
      display: none;
    }

    .panel {
      background: linear-gradient(180deg, rgba(43, 32, 20, 0.98), rgba(23, 17, 12, 0.98));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 14px 28px var(--shadow);
    }

    .devotion {
      overflow: hidden;
      align-self: stretch;
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto;
      place-items: center;
      min-height: 0;
      height: 100%;
      background:
        radial-gradient(circle at 50% 30%, rgba(218, 190, 115, 0.16), transparent 36%),
        #17110c;
    }

    .devotion img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: 50% 50%;
      filter: sepia(0.12) saturate(0.88) contrast(0.95);
    }

    .devotional-line {
      width: 100%;
      min-width: 0;
      padding: 12px 14px 14px;
      border-top: 1px solid rgba(201, 159, 63, 0.28);
      color: #efe4c9;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(1rem, 1.8vw, 1.32rem);
      font-variant: small-caps;
      letter-spacing: 0.04em;
      line-height: 1.2;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      background: rgba(16, 11, 7, 0.64);
    }

    @media (max-width: 920px) {
      .app {
        height: 100dvh;
      }

      .topbar {
        grid-template-columns: 1fr;
        justify-items: center;
        gap: 10px;
        padding: 10px 12px 12px;
      }

      .identity {
        justify-content: center;
      }

      .main {
        grid-template-columns: 1fr;
        grid-template-rows: minmax(0, 1fr);
        min-height: 0;
        padding: 10px;
      }

      .transport {
        justify-content: center;
      }

      .icon-btn {
        width: 54px;
        height: 54px;
      }

      .side {
        align-content: stretch;
        height: 100%;
      }

      .devotion {
        height: 100%;
      }

      .devotion img {
        height: 100%;
      }
    }

    @media (max-width: 560px) {
      .topbar {
        padding: 8px 10px 10px;
      }

      .identity {
        display: grid;
        justify-items: center;
        gap: 4px;
      }

      h1 {
        white-space: nowrap;
        font-size: clamp(1.55rem, 8vw, 2.25rem);
      }

      .icon-btn {
        width: 50px;
        height: 50px;
      }

      .main {
        grid-template-rows: minmax(0, 1fr);
        padding: 8px;
      }

      .devotion img {
        height: 100%;
      }

      .devotional-line {
        font-size: clamp(0.92rem, 4.2vw, 1.1rem);
        padding: 10px 10px 12px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="identity">
        <h1>Missa Perpetua</h1>
        <div class="subtitle" id="subtitle">ad honorem Sanctae Veronicae Giuliani</div>
      </div>
      <div class="transport" aria-label="Transport">
        <button class="icon-btn primary" id="play" type="button" title="Play" aria-label="Play"></button>
      </div>
    </header>

    <main class="main">
      <aside class="side">
        <section class="panel devotion">
          <img src="veronica-giuliani.jpg" alt="Saint Veronica Giuliani">
          <div class="devotional-line" id="devotionalLine">Ordo I · Kyrie</div>
        </section>
      </aside>

    </main>
  </div>

  <script>
    "use strict";

    const KEYS = ["soprano", "alto", "tenor", "bass"];
    const CF_KEY = "tenor";
    const AUDIO_LOOKAHEAD_SECONDS = 5.5;
    const SCHEDULER_INTERVAL_MS = 180;
    const MIN_AUDIO_SCHEDULE_SECONDS = 0.015;
    const JOIN_MARGIN_SECONDS = 0.38;
    const TEMPO_BPM = 64;
    const REVERB_AMOUNT = 0.82;
    const BEAT_SECONDS = 60 / TEMPO_BPM;
    // UTC anchors every device to the same completed cadence-to-cadence score window.
    const VERONICA_EPOCH_MS = Date.UTC(1727, 6, 9, 0, 0, 0);
    const SYNC_CYCLE_MEASURES = 80;
    const SYNC_PHRASE_MEASURES = 10;
    const SYNC_PHRASES_PER_CYCLE = SYNC_CYCLE_MEASURES / SYNC_PHRASE_MEASURES;
    const SYNC_CYCLE_BEATS = SYNC_CYCLE_MEASURES * 4;
    const SYNC_CYCLE_MILLISECONDS = SYNC_CYCLE_BEATS * BEAT_SECONDS * 1000;
    const PREPARE_CYCLE_BEATS = 32;

    const MASS_PARTS = [
      {
        name: "Kyrie",
        text: "Kyrie eleison. Christe eleison. Kyrie eleison.",
        syllables: ["Ky", "ri", "e", "e", "lei", "son", "Chri", "ste", "e", "lei", "son"]
      },
      {
        name: "Gloria",
        text: "Gloria in excelsis Deo, et in terra pax hominibus bonae voluntatis.",
        syllables: ["Glo", "ri", "a", "in", "ex", "cel", "sis", "De", "o", "et", "in", "ter", "ra", "pax", "ho", "mi", "ni", "bus", "bo", "nae", "vo", "lun", "ta", "tis"]
      },
      {
        name: "Credo",
        text: "Credo in unum Deum, Patrem omnipotentem, factorem caeli et terrae.",
        syllables: ["Cre", "do", "in", "u", "num", "De", "um", "Pa", "trem", "om", "ni", "po", "ten", "tem", "fac", "to", "rem", "cae", "li", "et", "ter", "rae"]
      },
      {
        name: "Sanctus",
        text: "Sanctus, Sanctus, Sanctus Dominus Deus Sabaoth.",
        syllables: ["Sanc", "tus", "Sanc", "tus", "Sanc", "tus", "Do", "mi", "nus", "De", "us", "Sa", "ba", "oth"]
      },
      {
        name: "Benedictus",
        text: "Benedictus qui venit in nomine Domini.",
        syllables: ["Be", "ne", "dic", "tus", "qui", "ve", "nit", "in", "no", "mi", "ne", "Do", "mi", "ni"]
      },
      {
        name: "Agnus Dei",
        text: "Agnus Dei, qui tollis peccata mundi, miserere nobis.",
        syllables: ["A", "gnus", "De", "i", "qui", "tol", "lis", "pec", "ca", "ta", "mun", "di", "mi", "se", "re", "re", "no", "bis"]
      }
    ];

    const MASS_PROFILES = {
      Kyrie: {
        measures: [7, 10],
        cantus: [["supplication", 4], ["circling", 3], ["arc", 2], ["lament", 1]],
        targetRange: [5, 7],
        register: { soprano: [0, 0], alto: [0, 0], tenor: [0, 0], bass: [0, 0] },
        centerShift: { soprano: -1, alto: -1, tenor: -1, bass: -1 },
        intensity: 0.32,
        suspensionChance: 0.48,
        passingChance: 0.58,
        neighborChance: 0.16,
        tieChance: 0.22,
        changeChance: 0.18,
        maxRun: 3
      },
      Gloria: {
        measures: [8, 12],
        cantus: [["ascent", 4], ["sequence", 3], ["arc", 3], ["recitation", 1]],
        targetRange: [7, 10],
        register: { soprano: [0, 2], alto: [0, 1], tenor: [0, 1], bass: [-1, 0] },
        centerShift: { soprano: 2, alto: 1, tenor: 1, bass: 0 },
        intensity: 0.78,
        suspensionChance: 0.26,
        passingChance: 0.88,
        neighborChance: 0.34,
        tieChance: 0.06,
        changeChance: 0.3,
        maxRun: 2
      },
      Credo: {
        measures: [9, 13],
        cantus: [["recitation", 5], ["sequence", 2], ["arc", 2], ["circling", 1]],
        targetRange: [4, 7],
        register: { soprano: [0, 1], alto: [0, 0], tenor: [0, 0], bass: [-1, 0] },
        centerShift: { soprano: 0, alto: 0, tenor: 0, bass: 0 },
        intensity: 0.5,
        suspensionChance: 0.3,
        passingChance: 0.62,
        neighborChance: 0.18,
        tieChance: 0.14,
        changeChance: 0.22,
        maxRun: 3
      },
      Sanctus: {
        measures: [7, 11],
        cantus: [["ascent", 3], ["arc", 3], ["circling", 2], ["recitation", 1]],
        targetRange: [6, 9],
        register: { soprano: [0, 2], alto: [0, 1], tenor: [0, 1], bass: [0, 0] },
        centerShift: { soprano: 2, alto: 1, tenor: 0, bass: 0 },
        intensity: 0.6,
        suspensionChance: 0.42,
        passingChance: 0.66,
        neighborChance: 0.22,
        tieChance: 0.12,
        changeChance: 0.24,
        maxRun: 2
      },
      Benedictus: {
        measures: [7, 10],
        cantus: [["circling", 4], ["recitation", 3], ["supplication", 2], ["arc", 1]],
        targetRange: [4, 6],
        register: { soprano: [0, 0], alto: [0, 0], tenor: [0, 0], bass: [0, 0] },
        centerShift: { soprano: -1, alto: 0, tenor: -1, bass: 0 },
        intensity: 0.36,
        suspensionChance: 0.4,
        passingChance: 0.52,
        neighborChance: 0.26,
        tieChance: 0.2,
        changeChance: 0.2,
        maxRun: 2
      },
      "Agnus Dei": {
        measures: [8, 12],
        cantus: [["lament", 5], ["supplication", 3], ["circling", 2], ["arc", 1]],
        targetRange: [5, 8],
        register: { soprano: [-1, 0], alto: [-1, 0], tenor: [-1, 0], bass: [-2, 0] },
        centerShift: { soprano: -2, alto: -1, tenor: -1, bass: -2 },
        intensity: 0.28,
        suspensionChance: 0.56,
        passingChance: 0.48,
        neighborChance: 0.12,
        tieChance: 0.28,
        changeChance: 0.16,
        maxRun: 3
      }
    };

    const DEFAULT_PROFILE = MASS_PROFILES.Kyrie;

    const MODES = [
      { name: "Dorian", final: "D", finalMidi: 50, intervals: [0, 2, 3, 5, 7, 9, 10], reciting: 4 },
      { name: "Phrygian", final: "E", finalMidi: 52, intervals: [0, 1, 3, 5, 7, 8, 10], reciting: 3 },
      { name: "Lydian", final: "F", finalMidi: 53, intervals: [0, 2, 4, 6, 7, 9, 11], reciting: 4 },
      { name: "Mixolydian", final: "G", finalMidi: 55, intervals: [0, 2, 4, 5, 7, 9, 10], reciting: 4 },
      { name: "Aeolian", final: "A", finalMidi: 57, intervals: [0, 2, 3, 5, 7, 8, 10], reciting: 3 }
    ];

    const VOICES = [
      { key: "soprano", label: "Soprano", min: 60, max: 79, center: 69, pan: -0.24, gain: 0.118, shift: 1.08, color: "#dcca70" },
      { key: "alto", label: "Alto", min: 55, max: 72, center: 63, pan: -0.08, gain: 0.112, shift: 0.98, color: "#bd7460" },
      { key: "tenor", label: "Tenor", min: 48, max: 67, center: 57, pan: 0.08, gain: 0.124, shift: 0.88, color: "#83adbb" },
      { key: "bass", label: "Bass", min: 40, max: 60, center: 49, pan: 0.24, gain: 0.132, shift: 0.76, color: "#7fa579" }
    ];
    const VOICE_BY_KEY = Object.fromEntries(VOICES.map(voice => [voice.key, voice]));

    const CONSONANT_WITH_BASS = new Set([0, 3, 4, 7, 8, 9]);
    const CONSONANT_UPPER = new Set([0, 3, 4, 5, 7, 8, 9]);
    const SUSPENSION_INTERVALS = new Set([2, 5, 10]);

    const FORMANTS = {
      a: [[690, 0.52, 4.4], [1080, 0.34, 5.2], [2380, 0.16, 7.5]],
      e: [[500, 0.47, 4.8], [1680, 0.34, 6.0], [2480, 0.14, 7.2]],
      i: [[310, 0.42, 5.2], [2140, 0.34, 6.5], [2920, 0.14, 8.0]],
      o: [[470, 0.49, 4.8], [860, 0.32, 5.0], [2320, 0.13, 7.2]],
      u: [[340, 0.38, 5.6], [760, 0.30, 5.2], [2180, 0.12, 7.2]]
    };

    const els = {
      subtitle: document.getElementById("subtitle"),
      play: document.getElementById("play"),
      devotionalLine: document.getElementById("devotionalLine")
    };

    const state = {
      seed: 0,
      rng: null,
      mode: null,
      mass: null,
      phrases: [],
      voices: emptyVoices(),
      phraseIndex: 0,
      nextBeat: 0,
      currentBeat: 0,
      playing: false,
      scheduled: new Set(),
      audio: null,
      activeNodes: [],
      uiTimer: 0,
      lastMetaWall: 0,
      memory: null,
      preparedThroughCycle: -1,
      joinBeat: 0,
    };

    function emptyVoices() {
      return Object.fromEntries(KEYS.map(key => [key, []]));
    }

    function xmur3(str) {
      let h = 1779033703 ^ str.length;
      for (let i = 0; i < str.length; i++) {
        h = Math.imul(h ^ str.charCodeAt(i), 3432918353);
        h = (h << 13) | (h >>> 19);
      }
      return function seedHash() {
        h = Math.imul(h ^ (h >>> 16), 2246822507);
        h = Math.imul(h ^ (h >>> 13), 3266489909);
        return (h ^= h >>> 16) >>> 0;
      };
    }

    function mulberry32(seed) {
      return function rng() {
        let t = seed += 0x6D2B79F5;
        t = Math.imul(t ^ (t >>> 15), t | 1);
        t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      };
    }

    function makeRng(seed) {
      return mulberry32(xmur3(seed)());
    }

    function monotonicNow() {
      return window.performance && typeof window.performance.now === "function"
        ? window.performance.now()
        : Date.now();
    }

    function elapsedSinceVeronicaMs(now = Date.now()) {
      return Math.max(0, now - VERONICA_EPOCH_MS);
    }

    function globalBeatNow(now = Date.now()) {
      return elapsedSinceVeronicaMs(now) / 1000 / BEAT_SECONDS;
    }

    function cycleAt(index) {
      const cycleIndex = Math.max(0, Math.floor(index));
      const startBeat = cycleIndex * SYNC_CYCLE_BEATS;
      return {
        index: cycleIndex,
        startBeat,
        endBeat: startBeat + SYNC_CYCLE_BEATS,
        seedSeconds: Math.floor((cycleIndex * SYNC_CYCLE_MILLISECONDS) / 1000)
      };
    }

    function currentCycle() {
      return cycleAt(Math.floor(elapsedSinceVeronicaMs() / SYNC_CYCLE_MILLISECONDS));
    }

    function pick(rng, array) {
      return array[Math.floor(rng() * array.length)];
    }

    function randInt(rng, min, max) {
      return min + Math.floor(rng() * (max - min + 1));
    }

    function weightedPick(rng, pairs) {
      const total = pairs.reduce((sum, [, weight]) => sum + weight, 0);
      let mark = rng() * total;
      for (const [value, weight] of pairs) {
        mark -= weight;
        if (mark <= 0) return value;
      }
      return pairs[pairs.length - 1][0];
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function profileFor(mass) {
      return MASS_PROFILES[mass?.name] || DEFAULT_PROFILE;
    }

    function createMeditationMemory() {
      return {
        intensity: 0.42,
        register: 0,
        massName: "",
        massRun: 0,
        lastContour: 0,
        lastApex: 0,
        lastRange: 0,
        motive: [0, 1, -1]
      };
    }

    function chooseNextMass(rng, currentMass, memory) {
      const currentProfile = profileFor(currentMass);
      const shouldMove = memory.massRun >= currentProfile.maxRun || rng() < currentProfile.changeChance;
      if (!shouldMove) return currentMass;
      const currentIndex = MASS_PARTS.indexOf(currentMass);
      const nextIndex = mod(currentIndex + weightedPick(rng, [[1, 4], [2, 1.4], [3, 0.6], [-1, 0.8]]), MASS_PARTS.length);
      return MASS_PARTS[nextIndex] === currentMass ? pick(rng, MASS_PARTS) : MASS_PARTS[nextIndex];
    }

    function profiledVoice(voiceOrKey, profile) {
      const voice = typeof voiceOrKey === "string" ? VOICE_BY_KEY[voiceOrKey] : voiceOrKey;
      const register = profile?.register?.[voice.key] || [0, 0];
      const centerShift = profile?.centerShift?.[voice.key] || 0;
      return {
        ...voice,
        min: voice.min + register[0],
        max: voice.max + register[1],
        center: voice.center + centerShift
      };
    }

    function updateMeditationMemory(phrase) {
      const memory = state.memory;
      if (!memory || !phrase) return;
      const cantus = phrase.cantus;
      const high = Math.max(...cantus);
      const low = Math.min(...cantus);
      const contour = cantus[cantus.length - 2] - cantus[1];
      const range = high - low;
      const profile = profileFor(phrase.mass);
      memory.massRun = memory.massName === phrase.mass.name ? memory.massRun + 1 : 1;
      memory.massName = phrase.mass.name;
      memory.lastContour = contour;
      memory.lastApex = cantus.indexOf(high) / Math.max(1, cantus.length - 1);
      memory.lastRange = range;
      memory.intensity = clamp(memory.intensity * 0.56 + profile.intensity * 0.34 + Math.min(1, range / 10) * 0.1, 0.18, 0.88);
      memory.register = clamp(memory.register * 0.62 + (profile.centerShift.soprano || 0) * 0.05 + contour * 0.025, -1, 1);
      memory.motive = [];
      for (let i = Math.max(1, cantus.length - 4); i < cantus.length; i++) {
        memory.motive.push(clamp(cantus[i] - cantus[i - 1], -2, 2));
      }
      if (!memory.motive.length) memory.motive = [0, 1, -1];
    }

    function mod(n, m) {
      return ((n % m) + m) % m;
    }

    function signed(n) {
      return n === 0 ? 0 : n > 0 ? 1 : -1;
    }

    function degreeToMidi(mode, degree) {
      const octave = Math.floor(degree / 7);
      const index = mod(degree, 7);
      return mode.finalMidi + octave * 12 + mode.intervals[index];
    }

    function midiToHz(midi) {
      return 440 * Math.pow(2, (midi - 69) / 12);
    }

    function simpleInterval(a, b) {
      return mod(Math.abs(a - b), 12);
    }

    function voiceDegreeLimits(mode, voice, profile) {
      const profiled = profiledVoice(voice, profile);
      const degrees = [];
      for (let degree = -24; degree <= 24; degree++) {
        const midi = degreeToMidi(mode, degree);
        if (midi >= profiled.min && midi <= profiled.max) degrees.push(degree);
      }
      return { min: Math.min(...degrees), max: Math.max(...degrees) };
    }

    function isTritone(mode, a, b) {
      return simpleInterval(degreeToMidi(mode, a), degreeToMidi(mode, b)) === 6;
    }

    function melodicIntervalOk(mode, a, b, maxSemitones = 7) {
      const semitones = Math.abs(degreeToMidi(mode, a) - degreeToMidi(mode, b));
      return semitones <= maxSemitones && semitones !== 6;
    }

    function resetStream() {
      const cycle = currentCycle();
      prepareSynchronizedWindow(cycle);
      state.currentBeat = globalBeatNow();
      renderMeta(true);
    }

    function prepareSynchronizedWindow(cycle) {
      state.phrases = [];
      state.voices = emptyVoices();
      state.scheduled = new Set();
      state.preparedThroughCycle = cycle.index - 1;
      appendSynchronizedCycle(cycle.index);
      appendSynchronizedCycle(cycle.index + 1);
    }

    function appendSynchronizedCycle(index) {
      if (index <= state.preparedThroughCycle) return;
      const cycle = cycleAt(index);
      state.seed = cycle.seedSeconds;
      state.rng = makeRng(`veronica-giuliani:${cycle.seedSeconds}`);
      state.mode = pick(state.rng, MODES);
      state.mass = pick(state.rng, MASS_PARTS);
      state.memory = createMeditationMemory();
      state.phraseIndex = 0;
      state.nextBeat = cycle.startBeat;

      for (let phraseNumber = 0; phraseNumber < SYNC_PHRASES_PER_CYCLE; phraseNumber++) {
        const phrase = generatePhrase(state.nextBeat, SYNC_PHRASE_MEASURES);
        state.phrases.push(phrase);
        for (const key of KEYS) state.voices[key].push(...phrase.events[key]);
        state.nextBeat = phrase.endBeat;
        state.phraseIndex += 1;
      }

      state.preparedThroughCycle = cycle.index;
    }

    function ensureSynchronizedWindow() {
      const cycle = currentCycle();
      const beat = globalBeatNow();

      if (state.preparedThroughCycle < cycle.index) {
        stopAudioNodes();
        prepareSynchronizedWindow(cycle);
        if (state.playing && state.audio) state.joinBeat = nextJoinBeat(beat, state.audio);
      }
      while (state.preparedThroughCycle < cycle.index + 1) {
        appendSynchronizedCycle(state.preparedThroughCycle + 1);
      }
      if (beat >= cycle.endBeat - PREPARE_CYCLE_BEATS) {
        appendSynchronizedCycle(cycle.index + 2);
      }

      state.currentBeat = beat;
      trimPast(Math.max(0, beat - 20));
    }

    function trimPast(beforeBeat) {
      if (beforeBeat <= 0) return;
      state.phrases = state.phrases.filter(phrase => phrase.endBeat > beforeBeat);
      for (const key of KEYS) {
        state.voices[key] = state.voices[key].filter(event => event.startBeat + event.duration > beforeBeat);
      }
      for (const id of state.scheduled) {
        const stillExists = KEYS.some(key => state.voices[key].some(event => event.id === id));
        if (!stillExists) state.scheduled.delete(id);
      }
    }

    function generatePhrase(startBeat, fixedMeasures = null) {
      const rng = state.rng;
      if (state.phraseIndex > 0) state.mass = chooseNextMass(rng, state.mass, state.memory);
      const profile = profileFor(state.mass);
      let lastDraft = null;

      for (let attempt = 0; attempt < 40; attempt++) {
        const measures = fixedMeasures ?? randInt(rng, profile.measures[0], profile.measures[1]);
        const cantus = generateCantus(state.mode, rng, measures, state.phraseIndex + attempt, profile, state.memory);
        const skeletonResult = generateSkeleton(state.mode, cantus, rng, profile);
        const phrase = {
          id: `c${Math.floor(startBeat / SYNC_CYCLE_BEATS)}-p${state.phraseIndex}`,
          index: state.phraseIndex,
          cycleIndex: Math.floor(startBeat / SYNC_CYCLE_BEATS),
          seed: state.seed,
          startBeat,
          endBeat: startBeat + measures * 4,
          measures,
          mode: state.mode,
          mass: state.mass,
          profile,
          cantus,
          skeleton: skeletonResult.skeleton,
          roots: skeletonResult.roots,
          stats: skeletonResult.stats,
          events: emptyVoices()
        };
        lastDraft = phrase;
        if (!skeletonPassesRules(phrase.skeleton)) continue;
        phrase.events = makeEvents(phrase, rng);
        phrase.stats.notes = KEYS.reduce((sum, key) => sum + phrase.events[key].length, 0);
        phrase.stats.range = Math.max(...cantus) - Math.min(...cantus);
        phrase.stats.redrafts = attempt;
        updateMeditationMemory(phrase);
        return phrase;
      }

      lastDraft.events = makeEvents(lastDraft, rng);
      lastDraft.stats.notes = KEYS.reduce((sum, key) => sum + lastDraft.events[key].length, 0);
      lastDraft.stats.range = Math.max(...lastDraft.cantus) - Math.min(...lastDraft.cantus);
      lastDraft.stats.redrafts = 40;
      updateMeditationMemory(lastDraft);
      return lastDraft;
    }

    function skeletonPassesRules(skeleton) {
      let prev = null;
      for (let slot = 0; slot < skeleton[CF_KEY].length; slot++) {
        const current = Object.fromEntries(KEYS.map(key => [key, {
          degree: skeleton[key][slot].degree,
          midi: skeleton[key][slot].midi
        }]));
        if (!(current.bass.midi < current.tenor.midi && current.tenor.midi < current.alto.midi && current.alto.midi < current.soprano.midi)) return false;
        if (!structuralConsonance(current)) return false;
        if (hasParallelPerfect(prev, current)) return false;
        if (hasHiddenOuterPerfect(prev, current)) return false;
        prev = current;
      }
      return true;
    }

    function generateCantus(mode, rng, measures, phraseIndex, profile = DEFAULT_PROFILE, memory = null) {
      const limits = voiceDegreeLimits(mode, CF_KEY, profile);
      const low = Math.max(-7, limits.min);
      const high = Math.min(9, limits.max);
      const penults = [1, -1].filter(degree => degree >= low && degree <= high);
      const family = chooseCantusFamily(rng, profile, memory, phraseIndex);
      const targetRange = randInt(rng, profile.targetRange[0], profile.targetRange[1]);
      let best = null;
      let bestScore = -Infinity;

      for (let attempt = 0; attempt < 900; attempt++) {
        const seq = [0];
        const apexAt = cantusApexIndex(rng, family, measures);
        const apexTarget = clamp(
          Math.max(mode.reciting + 1, weightedPick(rng, [[targetRange - 1, 2], [targetRange, 4], [targetRange + 1, 2], [targetRange + 2, 0.7]])),
          low,
          high
        );
        const reciting = clamp(mode.reciting + (profile.intensity > 0.6 ? 0 : -1) + (rng() < 0.3 ? 1 : 0), low, high);
        let previousLeap = 0;

        for (let i = 1; i < measures - 2; i++) {
          const current = seq[seq.length - 1];
          let moves = previousLeap
            ? [[-signed(previousLeap), 9], [-2 * signed(previousLeap), 3]]
            : [[0, 1.1], [1, 8], [-1, 8], [2, 4.5], [-2, 4.2], [3, 1.8], [-3, 1.6], [4, 0.75], [-4, 0.6], [5, 0.22], [-5, 0.18]];

          let candidates = moves
            .map(([move, weight]) => [current + move, weight])
            .filter(([next]) => next >= low && next <= high)
            .filter(([next]) => melodicIntervalOk(mode, current, next, 7));

          candidates = candidates.map(([next, weight]) => {
            let w = weight;
            if (i < apexAt) w *= next > current ? 1.35 : 0.82;
            if (i > apexAt) w *= next < current ? 1.28 : 0.84;
            if (Math.abs(next - reciting) <= 1) w *= 1 + (1 - profile.intensity) * 0.38;
            if (i === apexAt && next === apexTarget) w *= 4;
            w *= cantusFamilyWeight(family, next, current, seq, i, measures, apexAt, apexTarget, reciting, memory);
            return [next, Math.max(0.05, w)];
          });

          if (Math.abs(i - apexAt) <= 1 && melodicIntervalOk(mode, current, apexTarget, 7)) candidates.push([apexTarget, 5]);
          if (!candidates.length) candidates.push([0, 1]);
          const next = weightedPick(rng, candidates);
          previousLeap = Math.abs(next - current) > 2 ? next - current : 0;
          seq.push(next);
        }

        seq.push(choosePenult(rng, family, penults), 0);
        const score = scoreCantus(mode, seq, apexAt, apexTarget, targetRange, family, profile, memory);
        if (score > bestScore) {
          bestScore = score;
          best = seq;
        }
      }

      return best || fallbackCantus(measures);
    }

    function chooseCantusFamily(rng, profile, memory, phraseIndex) {
      const weighted = profile.cantus.map(([family, weight]) => {
        let w = weight;
        if (memory?.lastContour > 2 && family === "lament") w *= 1.35;
        if (memory?.lastContour < -2 && family === "ascent") w *= 1.35;
        if (phraseIndex % 5 === 0 && family === "arc") w *= 1.25;
        return [family, w];
      });
      return weightedPick(rng, weighted);
    }

    function cantusApexIndex(rng, family, measures) {
      if (family === "lament") return randInt(rng, Math.max(2, Math.floor(measures * 0.22)), Math.max(3, Math.floor(measures * 0.45)));
      if (family === "ascent") return randInt(rng, Math.max(3, Math.floor(measures * 0.52)), Math.max(4, measures - 3));
      if (family === "recitation") return randInt(rng, Math.max(2, Math.floor(measures * 0.35)), Math.max(3, Math.floor(measures * 0.62)));
      return randInt(rng, Math.max(2, Math.floor(measures * 0.34)), Math.max(3, Math.floor(measures * 0.72)));
    }

    function cantusFamilyWeight(family, next, current, seq, i, measures, apexAt, apexTarget, reciting, memory) {
      const progress = i / Math.max(1, measures - 1);
      let w = 1;
      if (family === "recitation") {
        w *= Math.abs(next - reciting) <= 1 ? 2.35 : 0.74;
        if (Math.abs(next - current) > 2) w *= 0.42;
        if (next === current) w *= 1.6;
      } else if (family === "lament") {
        if (progress > 0.28) w *= next < current ? 1.72 : 0.68;
        if (next <= 0) w *= 1.32;
        if (Math.abs(next - current) > 2) w *= 0.58;
      } else if (family === "ascent") {
        if (progress < 0.72) w *= next > current ? 1.58 : 0.76;
        if (next >= reciting) w *= 1.24;
      } else if (family === "circling") {
        if (Math.abs(next) <= 2 || Math.abs(next - reciting) <= 1) w *= 1.52;
        if (seq.length > 1 && signed(next - current) !== signed(current - seq[seq.length - 2])) w *= 1.32;
        if (Math.abs(next - current) > 3) w *= 0.55;
      } else if (family === "sequence") {
        const motive = memory?.motive?.length ? memory.motive : [1, -1, 2];
        const expected = seq[Math.max(0, seq.length - 2)] + motive[i % motive.length];
        if (next === expected || next === expected + 1 || next === expected - 1) w *= 1.85;
        if (Math.abs(next - current) > 3) w *= 0.72;
      } else if (family === "supplication") {
        if (next <= current && progress > 0.35) w *= 1.38;
        if (Math.abs(next) <= 3) w *= 1.5;
        if (Math.abs(next - current) > 2) w *= 0.45;
      }
      if (i === apexAt && next === apexTarget) w *= 1.5;
      return w;
    }

    function choosePenult(rng, family, penults) {
      if (!penults.length) return 1;
      if (penults.length === 1) return penults[0];
      if (family === "lament" || family === "supplication") return rng() < 0.62 ? -1 : 1;
      return rng() < 0.72 ? 1 : -1;
    }

    function fallbackCantus(measures) {
      const core = [0, 1, 3, 4, 5, 3, 2, 1, 0];
      const seq = [];
      for (let i = 0; i < measures - 2; i++) seq.push(core[Math.min(i, core.length - 3)]);
      seq.push(1, 0);
      return seq.slice(0, measures);
    }

    function scoreCantus(mode, seq, apexAt, apexTarget, targetRange, family, profile, memory) {
      let score = 0;
      const high = Math.max(...seq);
      const low = Math.min(...seq);
      const range = high - low;
      const apexIndex = seq.indexOf(high);
      const apexCount = seq.filter(note => note === high).length;
      let steps = 0;
      let leaps = 0;
      let recovered = 0;
      let directionChanges = 0;
      let repeatedRuns = 0;

      score += 34 - Math.abs(range - targetRange) * 4.2;
      score += apexCount === 1 ? 24 : -14 * apexCount;
      score += 18 - Math.abs(apexIndex - apexAt) * 1.5;
      score += high >= apexTarget - 1 ? 10 : -8;
      score += low < 0 ? 5 : 0;

      for (let i = 1; i < seq.length; i++) {
        const diff = seq[i] - seq[i - 1];
        const prevDiff = i > 1 ? seq[i - 1] - seq[i - 2] : 0;
        if (Math.abs(diff) <= 2) steps++;
        if (Math.abs(diff) > 2) {
          leaps++;
          const nextDiff = seq[i + 1] == null ? 0 : seq[i + 1] - seq[i];
          if (nextDiff && signed(nextDiff) === -signed(diff) && Math.abs(nextDiff) <= 2) recovered++;
          if (Math.abs(diff) > 5) score -= 14;
        }
        if (!melodicIntervalOk(mode, seq[i - 1], seq[i], 7)) score -= 30;
        if (prevDiff && diff && signed(prevDiff) !== signed(diff)) directionChanges++;
        if (i > 1 && seq[i] === seq[i - 1] && seq[i - 1] === seq[i - 2]) repeatedRuns++;
      }

      score += steps * 1.7;
      score += Math.min(leaps, 2) * 5;
      score += recovered * 7;
      score -= Math.max(0, leaps - recovered) * 10;
      score += Math.min(directionChanges, 5) * 2.2;
      score -= repeatedRuns * (family === "recitation" ? 4 : 12);
      score += Math.abs(seq[seq.length - 2]) === 1 ? 18 : -12;
      score += seq[0] === 0 && seq[seq.length - 1] === 0 ? 18 : -30;
      score += scoreCantusFamily(seq, family, mode, memory);
      return score;
    }

    function scoreCantusFamily(seq, family, mode, memory) {
      let score = 0;
      const high = Math.max(...seq);
      const low = Math.min(...seq);
      const contour = seq[seq.length - 2] - seq[1];
      const nearReciting = seq.filter(note => Math.abs(note - mode.reciting) <= 1).length;
      const descents = seq.filter((note, index) => index && note < seq[index - 1]).length;
      const ascents = seq.filter((note, index) => index && note > seq[index - 1]).length;

      if (family === "recitation") {
        score += nearReciting * 2.8;
        score -= Math.max(0, high - low - 7) * 3;
      } else if (family === "lament") {
        score += descents * 2.2 + (low <= -2 ? 9 : 0) + (contour < 0 ? 8 : -4);
      } else if (family === "ascent") {
        score += ascents * 1.6 + (high >= mode.reciting + 2 ? 9 : 0) + (contour > 0 ? 6 : -3);
      } else if (family === "circling") {
        const centered = seq.filter(note => Math.abs(note) <= 3 || Math.abs(note - mode.reciting) <= 1).length;
        score += centered * 1.7;
      } else if (family === "sequence") {
        for (let i = 2; i < seq.length - 2; i++) {
          if (seq[i] - seq[i - 1] === seq[i - 1] - seq[i - 2]) score += 2.1;
        }
      } else if (family === "supplication") {
        score += (high - low <= 6 ? 8 : -4) + descents * 1.4;
      }

      if (memory?.lastContour > 2 && contour < 0) score += 6;
      if (memory?.lastContour < -2 && contour > 0) score += 6;
      return score;
    }

    function generateSkeleton(mode, cantus, rng, profile) {
      const slots = cantus.length * 2;
      const skeleton = emptyVoices();
      const roots = [];
      const stats = { rejected: 0, parallelsAvoided: 0, hiddenAvoided: 0 };
      let prevRoot = null;
      let prev = null;

      for (let slot = 0; slot < slots; slot++) {
        const measure = Math.floor(slot / 2);
        const cfDegree = cantus[measure];
        let root = chooseRoot(mode, cfDegree, prevRoot, slot, slots, rng, profile);
        if (!chordContains(root, cfDegree)) root = cfDegree;
        const voicing = chooseVoicing(mode, cfDegree, root, prev, slot, slots, rng, stats, profile);
        roots.push(root);
        for (const key of KEYS) {
          skeleton[key].push({
            startBeat: slot * 2,
            duration: 2,
            degree: voicing[key].degree,
            midi: voicing[key].midi,
            root
          });
        }
        prevRoot = root;
        prev = voicing;
      }

      return { skeleton, roots, stats };
    }

    function chooseRoot(mode, cfDegree, prevRoot, slot, slots, rng, profile) {
      if (slot >= slots - 1) return 0;
      if (slot >= slots - 3) return 4;
      const candidates = [cfDegree, cfDegree - 2, cfDegree - 4]
        .map(root => root > 4 ? root - 7 : root < -4 ? root + 7 : root);
      const weighted = candidates.map(root => {
        let weight = 3.8;
        if (root === 0) weight += 1.4;
        if (root === 3 || root === 4) weight += 1.1;
        if (profile?.intensity > 0.65 && root !== prevRoot) weight *= 1.16;
        if (profile?.intensity < 0.35 && root === prevRoot) weight *= 1.2;
        if (prevRoot != null) weight += Math.max(0, 4 - Math.abs(root - prevRoot)) * 0.72;
        if (root === prevRoot && slot % 2 === 0) weight *= 0.72;
        return [root, Math.max(0.2, weight)];
      });
      return weightedPick(rng, weighted);
    }

    function chordResidues(root) {
      return new Set([mod(root, 7), mod(root + 2, 7), mod(root + 4, 7)]);
    }

    function chordContains(root, degree) {
      return chordResidues(root).has(mod(degree, 7));
    }

    function candidatesFor(mode, voice, residues, lowerMidi, upperMidi, profile) {
      const profiled = profiledVoice(voice, profile);
      const list = [];
      for (let degree = -22; degree <= 26; degree++) {
        const midi = degreeToMidi(mode, degree);
        if (midi < profiled.min || midi > profiled.max) continue;
        if (!residues.has(mod(degree, 7))) continue;
        if (lowerMidi != null && midi <= lowerMidi) continue;
        if (upperMidi != null && midi >= upperMidi) continue;
        list.push({ degree, midi });
      }
      return list;
    }

    function chooseVoicing(mode, cfDegree, root, prev, slot, slots, rng, stats, profile) {
      const residues = chordResidues(root);
      const tenor = { degree: cfDegree, midi: degreeToMidi(mode, cfDegree) };
      const basses = candidatesFor(mode, VOICE_BY_KEY.bass, residues, null, tenor.midi - 4, profile);
      const altos = candidatesFor(mode, VOICE_BY_KEY.alto, residues, tenor.midi + 2, null, profile);
      const sopranos = candidatesFor(mode, VOICE_BY_KEY.soprano, residues, tenor.midi + 7, null, profile);
      const finalists = [];

      for (const bass of basses) {
        for (const alto of altos) {
          if (alto.midi <= tenor.midi + 2) continue;
          for (const soprano of sopranos) {
            if (soprano.midi <= alto.midi + 2) continue;
            const current = { soprano, alto, tenor, bass };
            if (!structuralConsonance(current)) {
              stats.rejected += 1;
              continue;
            }
            if (hasParallelPerfect(prev, current)) {
              stats.parallelsAvoided += 1;
              continue;
            }
            if (hasHiddenOuterPerfect(prev, current)) {
              stats.hiddenAvoided += 1;
              continue;
            }
            if (!melodicMotionOk(mode, prev, current)) continue;
            finalists.push([current, scoreVoicing(prev, current, root, slot, slots, profile)]);
          }
        }
      }

      if (!finalists.length) return fallbackVoicing(mode, cfDegree, root, prev, profile);
      finalists.sort((a, b) => b[1] - a[1]);
      const elite = finalists.slice(0, Math.min(20, finalists.length));
      const floor = elite[elite.length - 1][1];
      return weightedPick(rng, elite.map(([candidate, score], index) => [
        candidate,
        Math.max(0.25, score - floor + 2.5 + (elite.length - index) * 0.06)
      ]));
    }

    function structuralConsonance(voicing) {
      const bass = voicing.bass.midi;
      for (const key of ["tenor", "alto", "soprano"]) {
        if (!CONSONANT_WITH_BASS.has(simpleInterval(bass, voicing[key].midi))) return false;
      }
      for (const [a, b] of [["tenor", "alto"], ["tenor", "soprano"], ["alto", "soprano"]]) {
        if (!CONSONANT_UPPER.has(simpleInterval(voicing[a].midi, voicing[b].midi))) return false;
      }
      return true;
    }

    function hasParallelPerfect(prev, current) {
      if (!prev) return false;
      for (let i = 0; i < KEYS.length; i++) {
        for (let j = i + 1; j < KEYS.length; j++) {
          const a = KEYS[i];
          const b = KEYS[j];
          const prevInt = simpleInterval(prev[a].midi, prev[b].midi);
          const nextInt = simpleInterval(current[a].midi, current[b].midi);
          const perfectBefore = prevInt === 0 || prevInt === 7;
          const perfectAfter = nextInt === 0 || nextInt === 7;
          const moveA = signed(current[a].midi - prev[a].midi);
          const moveB = signed(current[b].midi - prev[b].midi);
          if (perfectBefore && perfectAfter && moveA !== 0 && moveA === moveB) return true;
        }
      }
      return false;
    }

    function hasHiddenOuterPerfect(prev, current) {
      if (!prev) return false;
      const interval = simpleInterval(current.soprano.midi, current.bass.midi);
      if (interval !== 0 && interval !== 7) return false;
      const sopMove = current.soprano.midi - prev.soprano.midi;
      const bassMove = current.bass.midi - prev.bass.midi;
      return sopMove && bassMove && signed(sopMove) === signed(bassMove) && Math.abs(sopMove) > 2;
    }

    function melodicMotionOk(mode, prev, current) {
      if (!prev) return true;
      for (const key of KEYS) {
        const leap = Math.abs(current[key].degree - prev[key].degree);
        const semitones = Math.abs(current[key].midi - prev[key].midi);
        if (leap > 5) return false;
        if (semitones > 8 || semitones === 6) return false;
      }
      return true;
    }

    function scoreVoicing(prev, current, root, slot, slots, profile) {
      let score = 0;
      for (const key of KEYS) {
        const voice = profiledVoice(key, profile);
        score -= Math.abs(current[key].midi - voice.center) * 0.12;
        if (prev) {
          const leap = Math.abs(current[key].degree - prev[key].degree);
          score += leap <= 1 ? 5.2 : leap === 2 ? 2.4 : -leap * 1.9;
        }
      }
      if (mod(current.bass.degree - root, 7) === 0) score += 8;
      if (mod(current.bass.degree - (root + 4), 7) === 0) score += 2;
      const residues = new Set(KEYS.map(key => mod(current[key].degree, 7)));
      for (const residue of chordResidues(root)) if (residues.has(residue)) score += 2.8;

      const sa = current.soprano.midi - current.alto.midi;
      const at = current.alto.midi - current.tenor.midi;
      const tb = current.tenor.midi - current.bass.midi;
      if (sa > 12) score -= (sa - 12) * 2.3;
      if (at > 12) score -= (at - 12) * 2.3;
      if (tb > 19) score -= (tb - 19) * 1.5;
      if (sa < 3 || at < 3 || tb < 5) score -= 12;

      if (prev) {
        const tenorMotion = current.tenor.midi - prev.tenor.midi;
        for (const key of ["soprano", "alto", "bass"]) {
          const motion = current[key].midi - prev[key].midi;
          if (tenorMotion && motion && signed(tenorMotion) !== signed(motion)) score += 2.1;
        }
      }

      if (slot >= slots - 2) {
        score += mod(current.bass.degree, 7) === 0 ? 14 : -10;
        score += mod(current.soprano.degree, 7) === 0 ? 8 : 0;
      }
      return score;
    }

    function fallbackVoicing(mode, cfDegree, root, prev, profile) {
      const residues = chordResidues(root);
      const tenor = { degree: cfDegree, midi: degreeToMidi(mode, cfDegree) };
      let best = null;
      let bestScore = -Infinity;

      for (const requireMelodic of [true, false]) {
        for (const chordOnly of [true, false]) {
          const basses = relaxedCandidates(mode, VOICE_BY_KEY.bass, residues, null, tenor.midi - 3, chordOnly, profile);
          const altos = relaxedCandidates(mode, VOICE_BY_KEY.alto, residues, tenor.midi + 1, null, chordOnly, profile);
          const sopranos = relaxedCandidates(mode, VOICE_BY_KEY.soprano, residues, tenor.midi + 4, null, chordOnly, profile);

          for (const bass of basses) {
            for (const alto of altos) {
              if (alto.midi <= tenor.midi + 1) continue;
              for (const soprano of sopranos) {
                if (soprano.midi <= alto.midi + 1) continue;
                const current = { soprano, alto, tenor, bass };
                if (!structuralConsonance(current)) continue;
                if (hasParallelPerfect(prev, current)) continue;
                if (hasHiddenOuterPerfect(prev, current)) continue;
                if (requireMelodic && !melodicMotionOk(mode, prev, current)) continue;
                const score = scoreVoicing(prev, current, root, 0, 1, profile) - (chordOnly ? 0 : 7) - (requireMelodic ? 0 : 9);
                if (score > bestScore) {
                  bestScore = score;
                  best = current;
                }
              }
            }
          }
          if (best) return best;
        }
      }

      const bass = nearestCandidate(mode, VOICE_BY_KEY.bass, residues, prev?.bass?.midi ?? tenor.midi - 12, null, tenor.midi - 4, profile);
      const alto = nearestCandidate(mode, VOICE_BY_KEY.alto, residues, prev?.alto?.midi ?? tenor.midi + 7, tenor.midi + 2, null, profile);
      const soprano = nearestCandidate(mode, VOICE_BY_KEY.soprano, residues, prev?.soprano?.midi ?? alto.midi + 7, alto.midi + 2, null, profile);
      return { soprano, alto, tenor, bass };
    }

    function relaxedCandidates(mode, voice, residues, lowerMidi, upperMidi, chordOnly, profile) {
      const profiled = profiledVoice(voice, profile);
      const list = [];
      for (let degree = -22; degree <= 26; degree++) {
        const midi = degreeToMidi(mode, degree);
        if (midi < profiled.min || midi > profiled.max) continue;
        if (chordOnly && !residues.has(mod(degree, 7))) continue;
        if (lowerMidi != null && midi <= lowerMidi) continue;
        if (upperMidi != null && midi >= upperMidi) continue;
        list.push({ degree, midi });
      }
      return list;
    }

    function nearestCandidate(mode, voice, residues, target, lowerMidi, upperMidi, profile) {
      const profiled = profiledVoice(voice, profile);
      let list = candidatesFor(mode, voice, residues, lowerMidi, upperMidi, profile);
      if (!list.length) list = candidatesFor(mode, voice, residues, null, null, profile);
      if (!list.length) {
        for (let degree = -22; degree <= 26; degree++) {
          const midi = degreeToMidi(mode, degree);
          if (midi >= profiled.min && midi <= profiled.max) list.push({ degree, midi });
        }
      }
      return list.sort((a, b) => Math.abs(a.midi - target) - Math.abs(b.midi - target))[0];
    }

    function makeEvents(phrase, rng) {
      const events = emptyVoices();
      const profile = phrase.profile || profileFor(phrase.mass);
      for (const key of KEYS) {
        if (key === CF_KEY) {
          for (let m = 0; m < phrase.cantus.length; m++) {
            const syllable = syllableFor(phrase.mass, m * 2 + 2);
            events[key].push(makeEvent(phrase, key, m, 0, phrase.startBeat + m * 4, 4, phrase.cantus[m], syllable, { cantus: true }));
          }
          continue;
        }

        const line = phrase.skeleton[key];
        for (let i = 0; i < line.length; i++) {
          const note = line[i];
          const next = line[i + 1];
          const prev = line[i - 1];
          const absoluteStart = phrase.startBeat + note.startBeat;
          const syllable = syllableFor(phrase.mass, i + (key === "soprano" ? 0 : key === "alto" ? 2 : 4));

          if (next && next.degree === note.degree && rng() < profile.tieChance) {
            events[key].push(makeEvent(phrase, key, i, 0, absoluteStart, 4, note.degree, syllable, { tied: true }));
            i += 1;
            continue;
          }

          const bassAtSlot = phrase.skeleton.bass[i]?.midi ?? phrase.skeleton.bass[Math.max(0, i - 1)].midi;
          const canSuspend = prev
            && note.startBeat % 4 === 0
            && prev.degree === note.degree + 1
            && isPreparedSuspension(phrase.mode, prev.degree, note.degree, bassAtSlot)
            && rng() < profile.suspensionChance;

          if (canSuspend) {
            events[key].push(makeEvent(phrase, key, i, 0, absoluteStart, 1, prev.degree, syllable, { suspension: true }));
            events[key].push(makeEvent(phrase, key, i, 1, absoluteStart + 1, 1, note.degree, tieSyllable(syllable), { resolution: true }));
            continue;
          }

          if (next && Math.abs(next.degree - note.degree) === 2 && rng() < profile.passingChance) {
            const passingDegree = note.degree + signed(next.degree - note.degree);
            events[key].push(makeEvent(phrase, key, i, 0, absoluteStart, 1.05, note.degree, syllable, {}));
            events[key].push(makeEvent(phrase, key, i, 1, absoluteStart + 1.05, 0.95, passingDegree, tieSyllable(syllable), { passing: true }));
          } else if (next && next.degree === note.degree && rng() < profile.neighborChance) {
            const neighbor = note.degree + (rng() < 0.5 ? 1 : -1);
            const neighborMidi = degreeToMidi(phrase.mode, neighbor);
            const voice = profiledVoice(key, profile);
            if (neighborMidi >= voice.min && neighborMidi <= voice.max && !isTritone(phrase.mode, note.degree, neighbor)) {
              events[key].push(makeEvent(phrase, key, i, 0, absoluteStart, 0.78, note.degree, syllable, {}));
              events[key].push(makeEvent(phrase, key, i, 1, absoluteStart + 0.78, 0.58, neighbor, tieSyllable(syllable), { passing: true }));
              events[key].push(makeEvent(phrase, key, i, 2, absoluteStart + 1.36, 0.64, note.degree, tieSyllable(syllable), {}));
            } else {
              events[key].push(makeEvent(phrase, key, i, 0, absoluteStart, 2, note.degree, syllable, {}));
            }
          } else {
            events[key].push(makeEvent(phrase, key, i, 0, absoluteStart, 2, note.degree, syllable, {}));
          }
        }
      }
      return events;
    }

    function isPreparedSuspension(mode, heldDegree, targetDegree, bassMidi) {
      const heldMidi = degreeToMidi(mode, heldDegree);
      const targetMidi = degreeToMidi(mode, targetDegree);
      return SUSPENSION_INTERVALS.has(simpleInterval(heldMidi, bassMidi))
        && CONSONANT_WITH_BASS.has(simpleInterval(targetMidi, bassMidi));
    }

    function makeEvent(phrase, key, index, sub, startBeat, duration, degree, syllable, flags) {
      return {
        id: `${phrase.id}-${key}-${index}-${sub}`,
        phraseId: phrase.id,
        voice: key,
        startBeat,
        duration,
        degree,
        midi: degreeToMidi(phrase.mode, degree),
        syllable,
        vowel: vowelFor(syllable),
        ...flags
      };
    }

    function syllableFor(mass, index) {
      return mass.syllables[mod(index, mass.syllables.length)];
    }

    function tieSyllable(syllable) {
      return syllable;
    }

    function vowelFor(syllable) {
      const match = syllable.toLowerCase().match(/[aeiouy]+/g);
      if (!match) return "a";
      const vowel = match[match.length - 1].replace("y", "i").slice(-1);
      return FORMANTS[vowel] ? vowel : "a";
    }

    function currentPhrase() {
      ensureSynchronizedWindow();
      const beat = getCurrentBeat();
      return state.phrases.find(phrase => beat >= phrase.startBeat && beat < phrase.endBeat) || state.phrases[0];
    }

    function getCurrentBeat() {
      return globalBeatNow();
    }

    function toRoman(value) {
      let number = Math.max(0, Math.floor(Number(value) || 0));
      if (number === 0) return "N";
      if (number >= 4000) {
        const thousands = Math.floor(number / 1000);
        const remainder = number % 1000;
        return `(${toRoman(thousands)})${remainder ? toRoman(remainder) : ""}`;
      }
      const numerals = [
        [1000, "M"], [900, "CM"], [500, "D"], [400, "CD"],
        [100, "C"], [90, "XC"], [50, "L"], [40, "XL"],
        [10, "X"], [9, "IX"], [5, "V"], [4, "IV"], [1, "I"]
      ];
      let result = "";
      for (const [amount, symbol] of numerals) {
        while (number >= amount) {
          result += symbol;
          number -= amount;
        }
      }
      return result;
    }

    function renderMeta(force = false) {
      const now = monotonicNow();
      if (!force && now - state.lastMetaWall < 1500) return;
      state.lastMetaWall = now;
      const phrase = currentPhrase();
      const massName = phrase?.mass.name || state.mass.name;
      const seedName = `Ordo ${toRoman(phrase?.seed ?? state.seed)}`;
      els.devotionalLine.textContent = `${seedName} · ${massName}`;
      els.subtitle.textContent = "ad honorem Sanctae Veronicae Giuliani";
    }

    function outputLatencySeconds(audio) {
      const ctx = audio?.ctx;
      if (!ctx) return 0;
      const base = Number.isFinite(ctx.baseLatency) && ctx.baseLatency > 0 ? ctx.baseLatency : 0;
      const output = Number.isFinite(ctx.outputLatency) && ctx.outputLatency > 0 ? ctx.outputLatency : 0;
      return Math.min(1.2, base + output);
    }

    function audioTimeForBeat(audio, targetBeat, referenceBeat) {
      const ctx = audio.ctx;
      const targetPerformanceTime = monotonicNow() + (targetBeat - referenceBeat) * BEAT_SECONDS * 1000;
      let when = ctx.currentTime + (targetBeat - referenceBeat) * BEAT_SECONDS - outputLatencySeconds(audio);

      if (typeof ctx.getOutputTimestamp === "function") {
        try {
          const stamp = ctx.getOutputTimestamp();
          if (Number.isFinite(stamp?.contextTime) && Number.isFinite(stamp?.performanceTime)) {
            when = stamp.contextTime + (targetPerformanceTime - stamp.performanceTime) / 1000;
          }
        } catch (error) {
          // Fall back to the browser's latency estimates below.
        }
      }

      return Math.max(ctx.currentTime + MIN_AUDIO_SCHEDULE_SECONDS, when);
    }

    function nextJoinBeat(beat, audio) {
      const leadSeconds = Math.max(0.75, outputLatencySeconds(audio) + JOIN_MARGIN_SECONDS);
      return Math.ceil((beat + leadSeconds / BEAT_SECONDS) / 4) * 4;
    }

    function initAudio() {
      if (state.audio) return state.audio;
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      if (!AudioContext) return null;

      let ctx;
      try {
        ctx = new AudioContext({ latencyHint: "playback" });
      } catch (error) {
        ctx = new AudioContext();
      }
      const master = ctx.createGain();
      const dry = ctx.createGain();
      const wet = ctx.createGain();
      const convolver = ctx.createConvolver();
      const lowpass = ctx.createBiquadFilter();
      const highpass = ctx.createBiquadFilter();
      const compressor = ctx.createDynamicsCompressor();

      const voiceWave = makeVoiceWave(ctx);
      convolver.buffer = makeImpulse(ctx, 4.8);
      dry.gain.value = 0.46;
      wet.gain.value = REVERB_AMOUNT;
      master.gain.value = 0.86;
      lowpass.type = "lowpass";
      lowpass.frequency.value = 5200;
      lowpass.Q.value = 0.55;
      highpass.type = "highpass";
      highpass.frequency.value = 70;
      compressor.threshold.value = -23;
      compressor.knee.value = 26;
      compressor.ratio.value = 2.0;
      compressor.attack.value = 0.035;
      compressor.release.value = 0.38;

      dry.connect(highpass);
      wet.connect(convolver);
      convolver.connect(highpass);
      highpass.connect(lowpass);
      lowpass.connect(compressor);
      compressor.connect(master);
      master.connect(ctx.destination);

      state.audio = { ctx, dry, wet, voiceWave };
      return state.audio;
    }

    function makeVoiceWave(ctx) {
      const real = new Float32Array(7);
      const imag = new Float32Array(7);
      const harmonicGains = [0, 0.54, 0.24, 0.13, 0.065, 0.034, 0.018];
      for (let i = 1; i < harmonicGains.length; i++) imag[i] = harmonicGains[i] / Math.pow(i, 0.3);
      try {
        return ctx.createPeriodicWave(real, imag, { disableNormalization: false });
      } catch (error) {
        return ctx.createPeriodicWave(real, imag);
      }
    }

    function makeImpulse(ctx, seconds) {
      const rate = ctx.sampleRate;
      const length = Math.floor(rate * seconds);
      const buffer = ctx.createBuffer(2, length, rate);
      for (let channel = 0; channel < 2; channel++) {
        const data = buffer.getChannelData(channel);
        for (let i = 0; i < length; i++) {
          const t = i / length;
          const early = i < rate * 0.055 ? 0.42 : 1;
          data[i] = (Math.random() * 2 - 1) * Math.pow(1 - t, 3.3) * early;
        }
      }
      return buffer;
    }

    function play() {
      if (state.playing) {
        pause();
        return;
      }
      ensureSynchronizedWindow();
      const audio = initAudio();
      if (!audio) return;

      const begin = () => {
        if (state.playing) return;
        stopAudioNodes();
        state.scheduled = new Set();
        state.playing = true;
        state.currentBeat = globalBeatNow();
        state.joinBeat = nextJoinBeat(state.currentBeat, audio);
        els.play.classList.add("is-playing");
        els.play.title = "Pause";
        els.play.setAttribute("aria-label", "Pause");
        scheduleAhead(state.currentBeat);
        tick();
      };

      if (audio.ctx.state === "suspended") {
        audio.ctx.resume().then(begin).catch(error => console.warn("Audio resume blocked.", error));
      } else {
        begin();
      }
    }

    function pause() {
      if (!state.playing) return;
      state.currentBeat = globalBeatNow();
      state.playing = false;
      state.joinBeat = 0;
      stopAudioNodes();
      state.scheduled = new Set();
      els.play.classList.remove("is-playing");
      els.play.title = "Play";
      els.play.setAttribute("aria-label", "Play");
      clearTimeout(state.uiTimer);
      renderMeta(true);
    }

    function tick() {
      if (!state.playing) return;
      const beat = getCurrentBeat();
      state.currentBeat = beat;
      renderMeta();
      state.uiTimer = window.setTimeout(tick, 250);
    }

    function scheduleAhead(beat) {
      const audio = state.audio;
      if (!audio) return;
      pruneAudioRecords();
      const horizon = beat + AUDIO_LOOKAHEAD_SECONDS / BEAT_SECONDS;

      for (const voice of VOICES) {
        for (const event of state.voices[voice.key]) {
          if (state.joinBeat && event.startBeat < state.joinBeat) continue;
          if (event.startBeat + event.duration <= beat - 0.2) continue;
          if (event.startBeat > horizon) break;
          if (state.scheduled.has(event.id)) continue;
          const clippedStart = Math.max(event.startBeat, beat);
          const when = audioTimeForBeat(audio, clippedStart, beat);
          const duration = Math.max(0.08, (event.startBeat + event.duration - clippedStart) * BEAT_SECONDS);
          scheduleVocal(event, voice, when, duration);
          state.scheduled.add(event.id);
        }
      }
    }

    function scheduleVocal(event, voice, when, duration) {
      const audio = state.audio;
      if (!audio) return;
      const ctx = audio.ctx;
      const f0 = midiToHz(event.midi);
      const vowel = FORMANTS[event.vowel] || FORMANTS.a;
      const envelope = ctx.createGain();
      const pan = ctx.createStereoPanner();
      const tone = ctx.createGain();
      const body = ctx.createGain();
      const bodyFilter = ctx.createBiquadFilter();
      const vibrato = ctx.createOscillator();
      const vibratoDepth = ctx.createGain();
      const sources = [];
      const locals = [envelope, pan, tone, body, bodyFilter, vibratoDepth];
      const release = Math.min(0.9, Math.max(0.34, duration * 0.34));
      const attack = Math.min(0.28, Math.max(0.09, duration * 0.2));
      const gain = voice.gain * (event.cantus ? 1.08 : 1) * (event.passing ? 0.82 : 1);
      const releaseStart = when + Math.max(attack + 0.04, duration - release);
      const stopAt = when + duration + release + 0.14;

      envelope.gain.setValueAtTime(0.0001, when);
      envelope.gain.exponentialRampToValueAtTime(Math.max(0.0002, gain), when + attack);
      envelope.gain.setTargetAtTime(gain * 0.74, when + attack, Math.max(0.2, duration * 0.48));
      envelope.gain.setTargetAtTime(0.00001, releaseStart, release * 0.16);

      pan.pan.value = voice.pan + (Math.random() - 0.5) * 0.025;
      envelope.connect(pan);
      pan.connect(audio.dry);
      pan.connect(audio.wet);

      vibrato.type = "sine";
      vibrato.frequency.setValueAtTime(4.15 + Math.random() * 0.45, when);
      vibratoDepth.gain.setValueAtTime(0, when);
      vibratoDepth.gain.linearRampToValueAtTime(2.0 + Math.random() * 1.2, when + Math.min(1.1, duration * 0.55));
      vibrato.connect(vibratoDepth);

      const osc = ctx.createOscillator();
      if (audio.voiceWave) osc.setPeriodicWave(audio.voiceWave);
      else osc.type = "sine";
      osc.frequency.setValueAtTime(f0, when);
      osc.detune.setValueAtTime((Math.random() - 0.5) * 4.5, when);
      vibratoDepth.connect(osc.detune);
      osc.connect(tone);
      osc.start(when);
      osc.stop(stopAt);
      sources.push(osc);

      bodyFilter.type = "lowpass";
      bodyFilter.frequency.value = 1550 * voice.shift;
      bodyFilter.Q.value = 0.55;
      body.gain.value = 0.22;
      tone.connect(bodyFilter);
      bodyFilter.connect(body);
      body.connect(envelope);

      for (const [freq, amount, q] of vowel) {
        const filter = ctx.createBiquadFilter();
        const fg = ctx.createGain();
        locals.push(filter, fg);
        filter.type = "bandpass";
        filter.frequency.value = freq * voice.shift;
        filter.Q.value = q;
        fg.gain.value = amount;
        tone.connect(filter);
        filter.connect(fg);
        fg.connect(envelope);
      }

      vibrato.start(when);
      vibrato.stop(stopAt);
      sources.push(vibrato);
      trackAudioVoice(sources, locals, stopAt);
    }

    function trackAudioVoice(sources, locals, stopAt) {
      const audio = state.audio;
      const record = { sources, locals, stopAt, done: false };
      state.activeNodes.push(record);
      let pending = sources.length;
      const finish = () => {
        pending -= 1;
        if (pending <= 0) cleanupAudioRecord(record);
      };
      for (const source of sources) {
        source.onended = finish;
      }
      if (audio) {
        const delay = Math.max(50, (stopAt - audio.ctx.currentTime + 0.3) * 1000);
        window.setTimeout(() => cleanupAudioRecord(record), delay);
      }
    }

    function cleanupAudioRecord(record) {
      if (!record || record.done) return;
      record.done = true;
      for (const node of [...record.sources, ...record.locals]) {
        try {
          node.disconnect();
        } catch (error) {
          // The node may already be disconnected.
        }
      }
      const index = state.activeNodes.indexOf(record);
      if (index !== -1) state.activeNodes.splice(index, 1);
    }

    function pruneAudioRecords() {
      const audio = state.audio;
      if (!audio) return;
      const cutoff = audio.ctx.currentTime - 0.5;
      for (const record of [...state.activeNodes]) {
        if (record.stopAt < cutoff) cleanupAudioRecord(record);
      }
    }

    function stopAudioNodes() {
      for (const record of [...state.activeNodes]) {
        for (const source of record.sources) {
          try {
            source.stop(0);
          } catch (error) {
            // Some sources may already have ended.
          }
        }
        cleanupAudioRecord(record);
      }
      state.activeNodes = [];
    }

    els.play.addEventListener("click", play);

    setInterval(() => {
      ensureSynchronizedWindow();
      if (state.playing) scheduleAhead(getCurrentBeat());
    }, SCHEDULER_INTERVAL_MS);

    setInterval(() => {
      ensureSynchronizedWindow();
      if (!state.playing) {
        renderMeta(true);
      }
    }, 1800);

    resetStream();
  </script>
</body>
